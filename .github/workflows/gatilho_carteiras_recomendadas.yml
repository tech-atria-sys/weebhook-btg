name: Carteiras Recomendadas BTG

on:
  schedule:
    - cron: '0 11 * * 1-5'  # 08:00 horário de Brasília (UTC-3) — segunda a sexta
  workflow_dispatch:          # permite disparo manual pelo GitHub quando necessário

jobs:
  trigger:
    name: Disparar atualização de carteiras
    runs-on: ubuntu-latest

    steps:
      - name: Chamar endpoint de carteiras recomendadas
        run: |
          HTTP_STATUS=$(curl --silent --output response.json --write-out "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            "https://weebhook-btg.onrender.com/trigger/carteiras-recomendadas?token=583cc82acd14cc115a2f6b2e1cda1ee3")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response:"
          cat response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Falha no trigger — status $HTTP_STATUS"
            exit 1
          fi