name: Carteiras Recomendadas BTG

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * 1-5'  # 08:00 BRT (UTC-3) — segunda a sexta

jobs:
  trigger:
    name: Disparar atualização de carteiras
    runs-on: ubuntu-latest

    steps:
      - name: Chamar endpoint de carteiras recomendadas
        run: |
          HTTP_STATUS=$(curl --silent --output response.json --write-out "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            --header "X-Webhook-Token: ${{ secrets.WEBHOOK_TOKEN }}" \
            -X GET "https://weebhook-btg.onrender.com/trigger/carteiras-recomendadas")

          echo "HTTP Status: $HTTP_STATUS"
          cat response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Falha no trigger Carteiras Recomendadas — status $HTTP_STATUS"
            exit 1
          fi