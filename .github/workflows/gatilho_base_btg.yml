name: Gatilho Base BTG

on:
  workflow_dispatch:
  schedule:
    - cron: '00 10 * * *'  # 7:00 BRT (UTC-3) — segunda a sexta

jobs:
  disparar_base_btg:
    runs-on: ubuntu-latest
    steps:
      - name: Disparando Base BTG
        run: |
          echo "Solicitando Base de Clientes..."
          HTTP_STATUS=$(curl --silent --output response.json --write-out "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            --header "X-Webhook-Token: ${{ secrets.WEBHOOK_TOKEN }}" \
            -X GET "https://weebhook-btg.onrender.com/trigger/basebtg")

          echo "HTTP Status: $HTTP_STATUS"
          cat response.json

          if [ "$HTTP_STATUS" -ne 202 ]; then
            echo "Falha no trigger Base BTG — status $HTTP_STATUS"
            exit 1
          fi