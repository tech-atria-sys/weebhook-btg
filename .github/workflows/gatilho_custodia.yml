name: Gatilho Relatorio Custodia

on:
  workflow_dispatch:
  schedule:
    - cron: '30 09 * * 1-5'  # 06:30 BRT (UTC-3) — segunda a sexta

jobs:
  disparar_relatorio_custodia:
    runs-on: ubuntu-latest
    steps:
      - name: Disparando Relatório de Custodia - Produtos Estruturados
        run: |
          echo "Solicitando Relatório de Custodia..."
          HTTP_STATUS=$(curl --silent --output response.json --write-out "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            --header "X-Webhook-Token: ${{ secrets.WEBHOOK_TOKEN }}" \
            -X GET "https://weebhook-btg.onrender.com/trigger/custodia")

          echo "HTTP Status: $HTTP_STATUS"
          cat response.json

          if [ "$HTTP_STATUS" -ne 202 ]; then
            echo "Falha no trigger Custodia — status $HTTP_STATUS"
            exit 1
          fi