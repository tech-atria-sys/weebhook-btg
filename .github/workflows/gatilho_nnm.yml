name: Gatilho Relatorio NNM

on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * 1-5'  # 14:00 BRT (UTC-3) — segunda a sexta

jobs:
  disparar_nnm:
    runs-on: ubuntu-latest
    steps:
      - name: Disparando Relatorio NNM
        run: |
          echo "Solicitando NNM..."
          HTTP_STATUS=$(curl --silent --output response.json --write-out "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            --header "X-Webhook-Token: ${{ secrets.WEBHOOK_TOKEN }}" \
            -X GET "https://weebhook-btg.onrender.com/trigger/nnm")

          echo "HTTP Status: $HTTP_STATUS"
          cat response.json

          if [ "$HTTP_STATUS" -ne 202 ]; then
            echo "Falha no trigger NNM — status $HTTP_STATUS"
            exit 1
          fi