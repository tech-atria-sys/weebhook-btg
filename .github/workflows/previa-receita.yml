name: Prévia Receita — Atualização Horária

on:
  schedule:
    # Horário de Brasília (UTC-3): 07:55 até 17:55, de hora em hora
    # Segunda a sexta
    - cron: '55 10 * * 1-5'  # 07:55 BRT
    - cron: '55 11 * * 1-5'  # 08:55 BRT
    - cron: '55 12 * * 1-5'  # 09:55 BRT
    - cron: '55 13 * * 1-5'  # 10:55 BRT
    - cron: '55 14 * * 1-5'  # 11:55 BRT
    - cron: '55 15 * * 1-5'  # 12:55 BRT
    - cron: '55 16 * * 1-5'  # 13:55 BRT
    - cron: '55 17 * * 1-5'  # 14:55 BRT
    - cron: '55 18 * * 1-5'  # 15:55 BRT
    - cron: '55 19 * * 1-5'  # 16:55 BRT
    - cron: '55 20 * * 1-5'  # 17:55 BRT
  workflow_dispatch:          # Permite disparo manual quando necessário

jobs:
  atualizar-previa-receita:
    name: Atualizar Prévia de Receita
    runs-on: windows-latest   # Windows para compatibilidade com módulos locais

    steps:
      - name: Checkout do repositório atualizacoes_banco_local
        uses: actions/checkout@v4
        with:
          repository: tech-atria-sys/atualizacoes_banco_local  # <- troca pela org/usuário correto
          ref: main
          token: ${{ secrets.PAT_TOKEN }}

      - name: Instalar dependências
        run: pip install -r scripts_de_atualizacao_AZURE/requirements_previa_receita.txt

      - name: Executar script de atualização
        env:
          SERVER_NAME:    ${{ secrets.SERVER_NAME }}
          DATABASE_NAME:  ${{ secrets.DATABASE_NAME }}
          USERNAME:    ${{ secrets.USERNAME }}
          PASSWORD:    ${{ secrets.PASSWORD }}
        run: python scripts_de_atualizacao_AZURE/previa_receita.py

      - name: Notificar falha
        if: failure()
        run: echo "Falha na atualização da prévia de receita — verifique os logs acima."