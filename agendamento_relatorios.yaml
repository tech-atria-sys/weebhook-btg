services:

  # ── 07:00 BRT (10:00 UTC) — Segunda a Sexta ──────────────────

  - type: cron
    name: gatilho-base-btg
    runtime: python
    schedule: "00 10 * * 1-5"
    buildCommand: echo "ok"
    startCommand: >
      curl --silent --max-time 30 --retry 3 --retry-delay 10 --retry-all-errors
      --header "X-Webhook-Token: $WEBHOOK_TOKEN"
      -X GET "https://weebhook-btg.onrender.com/trigger/basebtg"
    envVars:
      - key: WEBHOOK_TOKEN
        sync: false

